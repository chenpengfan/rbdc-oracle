<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.1//EN"
        "https://raw.githubusercontent.com/rbatis/rbatis/master/rbatis-codegen/mybatis-3-mapper.dtd">
<mapper>
    <select id="select_by_condition">
        `select * from t_student`
        <where>
            <if test="name != ''">
                ` and name like #{name}`
            </if>
            ` and age = #{age}`
        </where>
    </select>
</mapper>
